<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ใบสมัครงาน – ร้านยาศรีสุพรรณ</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=Noto+Serif+Thai:wght@400;600;700&display=swap');

  :root {
    --purple-dark: #4a3575;
    --purple-mid: #7c5cbf;
    --purple-light: #c5aff0;
    --purple-pale: #f0ebfa;
    --purple-ghost: #faf8fe;
    --ink: #1e1533;
    --ink-soft: #4a4260;
    --line: #ddd4f0;
    --white: #ffffff;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Sarabun', sans-serif;
    background: #e8e2f5;
    color: var(--ink);
    font-size: 15.4px;
  }

  /* NAV BAR */
  .nav-bar {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    background: var(--purple-dark);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 11px 22px;
    box-shadow: 0 2.2px 13.2px rgba(74,53,117,.35);
    gap: 13.2px;
    flex-wrap: wrap;
  }
  .nav-title {
    font-family: 'Noto Serif Thai', serif;
    font-size: 16.5px;
    font-weight: 600;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .nav-controls {
    display: flex;
    align-items: center;
    gap: 11px;
    flex-wrap: wrap;
  }
  .nav-btn {
    background: rgba(255,255,255,.15);
    border: 1.1px solid rgba(255,255,255,.3);
    color: #fff;
    font-family: 'Sarabun', sans-serif;
    font-size: 15.4px;
    padding: 5.5px 17.6px;
    border-radius: 6.6px;
    cursor: pointer;
    transition: background .15s;
  }
  .nav-btn:hover { background: rgba(255,255,255,.28); }
  .nav-btn:disabled { opacity: .35; cursor: default; }
  .nav-counter { font-size: 14.3px; white-space: nowrap; opacity: .85; }
  .print-btn {
    background: var(--purple-light);
    border: none;
    color: var(--purple-dark);
    font-family: 'Sarabun', sans-serif;
    font-size: 14.3px;
    font-weight: 600;
    padding: 5.5px 15.4px;
    border-radius: 6.6px;
    cursor: pointer;
    transition: opacity .15s;
  }
  .print-btn:hover { opacity: .85; }
  .reload-btn {
    background: rgba(255,255,255,.1);
    border: 1.1px solid rgba(255,255,255,.25);
    color: #fff;
    font-family: 'Sarabun', sans-serif;
    font-size: 13.2px;
    padding: 5.5px 13.2px;
    border-radius: 6.6px;
    cursor: pointer;
    transition: background .15s;
  }
  .reload-btn:hover { background: rgba(255,255,255,.2); }

  /* GAS URL INPUT PANEL */
  .config-panel {
    position: fixed;
    top: 55px; left: 50%; transform: translateX(-50%);
    z-index: 200;
    background: #fff;
    border: 2.2px solid var(--purple-mid);
    border-radius: 13.2px;
    padding: 26.4px 30.8px;
    box-shadow: 0 8.8px 35.2px rgba(74,53,117,.25);
    width: min(572px, 92vw);
    display: none;
  }
  .config-panel.show { display: block; }
  .config-panel h3 {
    font-family: 'Noto Serif Thai', serif;
    color: var(--purple-dark);
    margin-bottom: 8.8px;
    font-size: 17.6px;
  }
  .config-panel p { font-size: 13.2px; color: var(--ink-soft); margin-bottom: 15.4px; line-height: 1.6; }
  .config-panel input {
    width: 100%;
    padding: 9.9px 13.2px;
    border: 1.7px solid var(--line);
    border-radius: 7.7px;
    font-family: 'Sarabun', sans-serif;
    font-size: 14.3px;
    margin-bottom: 13.2px;
    color: var(--ink);
  }
  .config-panel input:focus { outline: none; border-color: var(--purple-mid); }
  .config-row { display: flex; gap: 8.8px; }
  .btn-save {
    flex: 1;
    background: var(--purple-dark);
    color: #fff;
    border: none;
    border-radius: 7.7px;
    padding: 9.9px;
    font-family: 'Sarabun', sans-serif;
    font-size: 15.4px;
    font-weight: 600;
    cursor: pointer;
  }
  .btn-cancel {
    background: #f0f0f0;
    color: var(--ink-soft);
    border: none;
    border-radius: 7.7px;
    padding: 9.9px 17.6px;
    font-family: 'Sarabun', sans-serif;
    font-size: 15.4px;
    cursor: pointer;
  }
  .overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,.35);
    z-index: 150;
  }
  .overlay.show { display: block; }

  /* LOADING / ERROR */
  .status-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: calc(100vh - 55px);
    gap: 17.6px;
    padding-top: 55px;
  }
  .spinner {
    width: 44px; height: 44px;
    border: 4.4px solid var(--purple-light);
    border-top-color: var(--purple-dark);
    border-radius: 50%;
    animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .status-msg { color: var(--ink-soft); font-size: 16.5px; }
  .error-box {
    background: #fff0f0;
    border: 1.7px solid #ffb3b3;
    border-radius: 11px;
    padding: 22px 30.8px;
    max-width: 528px;
    text-align: center;
  }
  .error-box h3 { color: #c0392b; margin-bottom: 8.8px; }
  .error-box p { font-size: 14.3px; color: #666; line-height: 1.7; }
  .error-box .setup-btn {
    margin-top: 15.4px;
    background: var(--purple-dark);
    color: #fff;
    border: none;
    border-radius: 7.7px;
    padding: 9.9px 24.2px;
    font-family: 'Sarabun', sans-serif;
    font-size: 15.4px;
    cursor: pointer;
  }

  /* CANVAS */
  .canvas {
    padding: 66px 22px 44px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* A4 PAGE */
  .page {
    width: 210mm;
    min-height: 297mm;
    background: var(--white);
    box-shadow: 0 4.4px 26.4px rgba(74,53,117,.18);
    border-radius: 3.3px;
    padding: 16mm 16mm 14mm;
    display: none;
    flex-direction: column;
    position: relative;
    page-break-after: always;
  }
  .page.active { display: flex; }

  /* PAGE HEADER */
  .page-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    border-bottom: 2.8px solid var(--purple-dark);
    padding-bottom: 11px;
    margin-bottom: 15.4px;
    gap: 13.2px;
  }
  .store-name {
    font-family: 'Noto Serif Thai', serif;
    font-size: 19.8px;
    font-weight: 700;
    color: var(--purple-dark);
    line-height: 1.2;
  }
  .doc-label { font-size: 12.1px; color: var(--ink-soft); margin-top: 3.3px; }
  .header-badge {
    background: var(--purple-pale);
    border: 1.1px solid var(--purple-light);
    border-radius: 6.6px;
    padding: 6.6px 13.2px;
    text-align: right;
    flex-shrink: 0;
  }
  .header-badge .app-no { font-size: 11px; color: var(--ink-soft); }
  .header-badge .app-date { font-size: 12.1px; color: var(--purple-dark); font-weight: 600; }

  /* HERO */
  .hero {
    background: var(--purple-pale);
    border-left: 4.4px solid var(--purple-mid);
    border-radius: 0 8.8px 8.8px 0;
    padding: 11px 15.4px;
    margin-bottom: 15.4px;
    display: flex;
    align-items: center;
    gap: 15.4px;
  }
  .hero-avatar {
    width: 57.2px; height: 57.2px;
    border-radius: 50%;
    background: var(--purple-light);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Noto Serif Thai', serif;
    font-size: 22px;
    color: var(--purple-dark);
    font-weight: 700;
    flex-shrink: 0;
  }
  .hero-name {
    font-family: 'Noto Serif Thai', serif;
    font-size: 18.7px;
    font-weight: 700;
    color: var(--purple-dark);
  }
  .hero-nickname { font-size: 13.2px; color: var(--ink-soft); margin-top: 1.1px; }
  .hero-salary { margin-left: auto; text-align: right; flex-shrink: 0; }
  .salary-label { font-size: 11px; color: var(--ink-soft); }
  .salary-val { font-size: 16.5px; font-weight: 700; color: var(--purple-mid); }

  /* SECTION */
  .section { margin-bottom: 12.1px; }
  .section-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--purple-mid);
    border-bottom: 1.1px solid var(--line);
    padding-bottom: 4.4px;
    margin-bottom: 7.7px;
  }

  /* GRID */
  .field-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6.6px 15.4px; }
  .field-grid.two-col { grid-template-columns: repeat(2, 1fr); }
  .field { display: flex; flex-direction: column; gap: 2.2px; }
  .field-label { font-size: 10.5px; color: var(--ink-soft); font-weight: 600; }
  .field-value { font-size: 13.2px; color: var(--ink); line-height: 1.4; }
  .field-value.mono { font-family: monospace; font-size: 12.7px; }

  /* SKILLS */
  .skill-row { display: flex; flex-wrap: wrap; gap: 6.6px; margin-top: 2.2px; }
  .pill { font-size: 11.6px; padding: 3.3px 11px; border-radius: 22px; font-weight: 500; }
  .pill-yes { background: #e8f5e9; color: #2e7d32; border: 1.1px solid #a5d6a7; }
  .pill-no  { background: #fce4ec; color: #b71c1c; border: 1.1px solid #ef9a9a; }

  /* EXP */
  .exp-block {
    background: var(--purple-ghost);
    border: 1.1px solid var(--line);
    border-radius: 6.6px;
    padding: 8.8px 13.2px;
    font-size: 12.7px;
    line-height: 1.7;
    color: var(--ink);
    white-space: pre-line;
  }

  /* QUOTE */
  .quote-block {
    font-size: 13.2px;
    color: var(--ink-soft);
    font-style: italic;
    line-height: 1.6;
    padding-left: 11px;
    border-left: 3.3px solid var(--purple-light);
  }

  /* SIGNATURE */
  .sig-section {
    margin-top: auto;
    padding-top: 17.6px;
    border-top: 1.1px dashed var(--line);
  }
  .sig-statement {
    font-size: 12.7px;
    color: var(--ink-soft);
    text-align: center;
    margin-bottom: 22px;
    line-height: 1.6;
  }
  .sig-boxes { display: flex; justify-content: center; gap: 66px; }
  .sig-box { display: flex; flex-direction: column; align-items: center; gap: 6.6px; min-width: 154px; }
  .sig-line { width: 154px; border-bottom: 1.7px solid var(--ink); }
  .sig-caption { font-size: 11px; color: var(--ink-soft); text-align: center; line-height: 1.5; }
  .sig-space { height: 39.6px; }

  /* FOOTER */
  .page-footer {
    position: absolute;
    bottom: 8mm; left: 16mm; right: 16mm;
    display: flex;
    justify-content: space-between;
    font-size: 9.9px;
    color: #bbb;
  }

  /* PRINT */
  @media print {
    body { background: white; }
    .nav-bar, .config-panel, .overlay { display: none !important; }
    .canvas { padding: 0; }
    .page { display: flex !important; box-shadow: none; border-radius: 0; page-break-after: always; break-after: page; }
  }
  @page { size: A4; margin: 0; }
</style>
</head>
<body>

<!-- NAV BAR -->
<div class="nav-bar">
  <div class="nav-title">ใบสมัครงาน – ร้านยาศรีสุพรรณ</div>
  <div class="nav-controls">
    <button class="nav-btn" id="prevBtn" onclick="navigate(-1)">◀ ก่อนหน้า</button>
    <span class="nav-counter" id="counter">– / –</span>
    <button class="nav-btn" id="nextBtn" onclick="navigate(1)">ถัดไป ▶</button>
    <button class="reload-btn" onclick="loadData()">🔄 โหลดใหม่</button>
    <button class="print-btn" onclick="printCurrent()">🖨 พิมพ์ / PDF</button>
    <button class="reload-btn" onclick="openConfig()">⚙️ ตั้งค่า URL</button>
  </div>
</div>

<!-- OVERLAY + CONFIG PANEL -->
<div class="overlay" id="overlay" onclick="closeConfig()"></div>
<div class="config-panel" id="configPanel">
  <h3>ตั้งค่า GAS Web App URL</h3>
  <p>วาง URL ของ Google Apps Script Web App ที่ Deploy แล้ว<br>
  (ได้จาก Apps Script → Deploy → New Deployment → Web App → Copy URL)</p>
  <input type="text" id="gasUrlInput" placeholder="https://script.google.com/macros/s/.../exec" />
  <div class="config-row">
    <button class="btn-save" onclick="saveConfig()">💾 บันทึก &amp; โหลดข้อมูล</button>
    <button class="btn-cancel" onclick="closeConfig()">ยกเลิก</button>
  </div>
</div>

<!-- MAIN CANVAS -->
<div class="canvas" id="canvas">
  <div class="status-screen" id="statusScreen">
    <div class="spinner" id="spinner"></div>
    <div class="status-msg" id="statusMsg">กำลังโหลดข้อมูล...</div>
  </div>
</div>

<script>
// ─── STATE ───────────────────────────────────────────
const STORAGE_KEY = 'srisupan_gas_url';
let applicants = [];
let current = 0;
let cbCounter = 0;

// ─── CONFIG ──────────────────────────────────────────
const DEFAULT_GAS_URL = 'https://script.google.com/macros/s/AKfycbwMOAqR7HUW1aD06prWa7zB4v__4TgG0-zeZSWN_S9BCZPUrOx37CrwAMNMe6XquUNC/exec';
function getGasUrl() {
  return localStorage.getItem(STORAGE_KEY) || DEFAULT_GAS_URL;
}
function openConfig() {
  document.getElementById('gasUrlInput').value = getGasUrl();
  document.getElementById('configPanel').classList.add('show');
  document.getElementById('overlay').classList.add('show');
}
function closeConfig() {
  document.getElementById('configPanel').classList.remove('show');
  document.getElementById('overlay').classList.remove('show');
}
function saveConfig() {
  const url = document.getElementById('gasUrlInput').value.trim();
  if (!url) { alert('กรุณากรอก URL'); return; }
  localStorage.setItem(STORAGE_KEY, url);
  closeConfig();
  loadData();
}

// ─── LOAD DATA ────────────────────────────────────────
function loadData() {
  const url = getGasUrl();
  if (!url) {
    showError('ยังไม่ได้ตั้งค่า GAS URL', 'กดปุ่ม ⚙️ ตั้งค่า URL เพื่อใส่ Web App URL จาก Google Apps Script');
    return;
  }
  showLoading();

  const cbName = 'cb_' + (++cbCounter);
  const script = document.createElement('script');
  const timer = setTimeout(() => {
    cleanup();
    showError('หมดเวลาเชื่อมต่อ', 'ไม่ได้รับข้อมูลจาก GAS ภายใน 15 วินาที กรุณาตรวจสอบ URL และการ Deploy');
  }, 15000);

  window[cbName] = function(data) {
    clearTimeout(timer);
    cleanup();
    if (data.error) {
      showError('GAS ส่ง Error กลับมา', data.error);
    } else {
      applicants = data.applicants || [];
      if (applicants.length === 0) {
        showError('ไม่พบข้อมูลผู้สมัคร', 'Sheet อาจยังไม่มีข้อมูล หรือชื่อ column ไม่ตรง');
      } else {
        renderAll();
        showPage(0);
      }
    }
    delete window[cbName];
  };

  function cleanup() { if (script.parentNode) script.parentNode.removeChild(script); }

  script.src = url + '?callback=' + cbName + '&t=' + Date.now();
  script.onerror = () => {
    clearTimeout(timer);
    cleanup();
    showError('โหลดข้อมูลไม่สำเร็จ', 'ตรวจสอบว่า Deploy เป็น "Anyone" และ URL ถูกต้อง');
    delete window[cbName];
  };
  document.head.appendChild(script);
}

// ─── STATUS SCREENS ───────────────────────────────────
function showLoading() {
  const c = document.getElementById('canvas');
  c.innerHTML = `
    <div class="status-screen">
      <div class="spinner"></div>
      <div class="status-msg">กำลังดึงข้อมูลจาก Google Sheets...</div>
    </div>`;
}

function showError(title, detail) {
  const c = document.getElementById('canvas');
  c.innerHTML = `
    <div class="status-screen">
      <div class="error-box">
        <h3>⚠️ ${title}</h3>
        <p>${detail}</p>
        <button class="setup-btn" onclick="openConfig()">⚙️ ตั้งค่า GAS URL</button>
      </div>
    </div>`;
}

// ─── RENDER ───────────────────────────────────────────
function renderAll() {
  const canvas = document.getElementById('canvas');
  canvas.innerHTML = '';
  applicants.forEach((a, i) => {
    canvas.appendChild(buildPage(a, i));
  });
  updateNav();
}

function buildPage(a, idx) {
  const total = applicants.length;
  const initial = getInitial(a.fullname);
  const skillHtml = [
    {label:'คอมพิวเตอร์พื้นฐาน', val: a.skill_computer},
    {label:'Excel / Word',        val: a.skill_excel},
    {label:'ทำความสะอาดทั่วไป',   val: a.skill_clean},
    {label:'ภาษาอังกฤษ',          val: a.skill_english},
  ].map(s => {
    const yes = s.val && s.val.includes('ได้') && !s.val.includes('ไม่ได้');
    return `<span class="pill ${yes ? 'pill-yes' : 'pill-no'}">${yes ? '✓' : '✗'} ${s.label}</span>`;
  }).join('');

  const div = document.createElement('div');
  div.className = 'page' + (idx === 0 ? ' active' : '');
  div.id = 'page-' + idx;
  div.innerHTML = `
    <div class="page-header">
      <div>
        <div class="store-name">ร้านยาศรีสุพรรณ</div>
        <div class="doc-label">ใบสมัครงาน · แบบฟอร์มรายงานผู้สมัคร</div>
      </div>
      <div class="header-badge">
        <div class="app-no">ผู้สมัครลำดับที่ ${idx + 1}</div>
        <div class="app-date">${a.timestamp}</div>
      </div>
    </div>

    <div class="hero">
      <div class="hero-avatar">${initial}</div>
      <div>
        <div class="hero-name">${esc(a.fullname)}</div>
        <div class="hero-nickname">ชื่อเล่น: ${esc(a.nickname)}</div>
      </div>
      <div class="hero-salary">
        <div class="salary-label">เงินเดือนที่คาดหวัง</div>
        <div class="salary-val">${esc(a.salary)}</div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">ข้อมูลส่วนตัว</div>
      <div class="field-grid">
        <div class="field"><div class="field-label">วันเดือนปีเกิด</div><div class="field-value">${formatThaiDate(a.birthdate)} (อายุ ${esc(a.age)} ปี)</div></div>
        <div class="field"><div class="field-label">สถานภาพ</div><div class="field-value">${esc(a.status)} · ${a.has_child === 'มี' ? 'มีบุตร' : 'ไม่มีบุตร'}</div></div>
        <div class="field"><div class="field-label">วุฒิการศึกษา</div><div class="field-value">${esc(a.education)}</div></div>
        <div class="field"><div class="field-label">ที่อยู่ปัจจุบัน</div><div class="field-value">${esc(a.address)}</div></div>
        <div class="field"><div class="field-label">การเดินทาง</div><div class="field-value">${esc(a.transport)}</div></div>
        <div class="field"><div class="field-label">เบอร์โทร</div><div class="field-value mono">${esc(a.phone)}</div></div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">ผู้ติดต่อฉุกเฉิน</div>
      <div class="field-grid two-col">
        <div class="field"><div class="field-label">ชื่อผู้ติดต่อ</div><div class="field-value">${esc(a.emergency_name)} (${esc(a.emergency_relation)})</div></div>
        <div class="field"><div class="field-label">เบอร์โทร</div><div class="field-value mono">${esc(a.emergency_phone)}</div></div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">ประสบการณ์การทำงาน</div>
      <div class="exp-block">${esc(a.experience) || '–'}</div>
    </div>

    <div class="section">
      <div class="section-title">ทักษะ</div>
      <div class="skill-row">${skillHtml}</div>
    </div>

    ${a.motto ? `
    <div class="section">
      <div class="section-title">คติประจำใจ</div>
      <div class="quote-block">${esc(a.motto)}</div>
    </div>` : ''}

    ${a.intro ? `
    <div class="section">
      <div class="section-title">แนะนำตนเอง</div>
      <div class="quote-block">${esc(a.intro)}</div>
    </div>` : ''}

    <div class="sig-section">
      <div class="sig-statement">
        ข้าพเจ้าขอรับรองว่าข้อมูลที่ให้ไว้ในใบสมัครนี้เป็นความจริงทุกประการ<br>
        หากพบในภายหลังว่าข้อมูลเป็นเท็จ ข้าพเจ้ายินยอมให้ทางร้านยกเลิกการว่าจ้างได้ทันที
      </div>
      <div class="sig-boxes">
        <div class="sig-box">
          <div class="sig-space"></div>
          <div class="sig-line"></div>
          <div class="sig-caption">ลายมือชื่อผู้สมัคร<br>(${esc(a.fullname)})</div>
        </div>
        <div class="sig-box">
          <div class="sig-space"></div>
          <div class="sig-line"></div>
          <div class="sig-caption">ลายมือชื่อผู้รับสมัคร<br>วันที่ ............................................</div>
        </div>
      </div>
    </div>

    <div class="page-footer">
      <span>ร้านยาศรีสุพรรณ · เอกสารลับ</span>
      <span>ผู้สมัคร ${idx + 1}/${total}</span>
    </div>
  `;
  return div;
}

const THAI_MONTHS = ['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน',
                     'กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];

function formatThaiDate(raw) {
  if (!raw) return '–';
  // ถ้าเป็น Date object หรือ string ที่ GAS ส่งมาเป็น full date
  const d = new Date(raw);
  if (!isNaN(d.getTime())) {
    const day = d.getDate();
    const month = THAI_MONTHS[d.getMonth()];
    const year = d.getFullYear() + 543; // แปลงเป็น พ.ศ.
    return `${day} ${month} ${year}`;
  }
  // ถ้าเป็น string ธรรมดา เช่น "5/6/2001" หรือ "5 Jun 2001"
  const parts = raw.toString().match(/(\d{1,2})[\/\-\.](\d{1,2})[\/\-\.](\d{4})/);
  if (parts) {
    const day = parseInt(parts[1]);
    const month = THAI_MONTHS[parseInt(parts[2]) - 1] || parts[2];
    const year = parseInt(parts[3]) + 543;
    return `${day} ${month} ${year}`;
  }
  return raw; // fallback
}

function getInitial(name) {
  if (!name) return '?';
  const clean = name.replace(/^(น\.ส\.|นาง|นาย|น\.ส|นางสาว)\s*/i, '').trim();
  return clean.charAt(0) || name.charAt(0);
}

function esc(str) {
  if (!str) return '';
  return str.toString()
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

// ─── NAVIGATION ───────────────────────────────────────
function showPage(idx) {
  if (idx < 0 || idx >= applicants.length) return;
  document.querySelectorAll('.page').forEach((p, i) => {
    p.classList.toggle('active', i === idx);
  });
  current = idx;
  updateNav();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function navigate(dir) {
  showPage(current + dir);
}

function updateNav() {
  const total = applicants.length;
  document.getElementById('counter').textContent = total > 0 ? (current + 1) + ' / ' + total : '– / –';
  const prev = document.getElementById('prevBtn');
  const next = document.getElementById('nextBtn');
  if (prev) prev.disabled = current === 0;
  if (next) next.disabled = current >= total - 1;
}

function printCurrent() {
  const pages = document.querySelectorAll('.page');
  pages.forEach((p, i) => { if (i !== current) p.style.display = 'none'; });
  window.print();
  pages.forEach((p, i) => {
    p.style.display = '';
    if (i === current) p.classList.add('active');
  });
}

// ─── KEYBOARD ────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') navigate(1);
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   navigate(-1);
});

// ─── INIT ────────────────────────────────────────────
loadData();
</script>
